<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brief Archive</title>
    <style>
    :root {
        --background: oklch(0.12 0 0);
        --foreground: oklch(0.93 0 0);
        --card: oklch(0.17 0.005 260);
        --card-foreground: oklch(0.93 0 0);
        --muted: oklch(0.269 0 0);
        --muted-foreground: oklch(0.6 0 0);
        --border: oklch(1 0 0 / 8%);
        --accent-blue: oklch(0.7 0.15 250);
        --accent-green: oklch(0.7 0.15 155);
        --accent-amber: oklch(0.75 0.15 75);
        --accent-purple: oklch(0.7 0.12 300);
        --radius: 0.5rem;
        --font-sans: system-ui, -apple-system, 'Segoe UI', sans-serif;
        --font-mono: ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: var(--font-sans);
        background: var(--background);
        color: var(--foreground);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
    }

    .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
    }

    /* === HEADER === */
    .header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 2rem;
        padding-bottom: 1.5rem;
        border-bottom: 1px solid var(--border);
    }

    h1 {
        font-size: 1.5rem;
        font-weight: 800;
        letter-spacing: -0.04em;
        text-transform: uppercase;
    }

    .subtitle { color: var(--muted-foreground); font-size: 0.75rem; margin-top: 0.25rem; letter-spacing: 0.05em; text-transform: uppercase; }

    .archive-btn, .back-link {
        color: var(--muted-foreground);
        text-decoration: none;
        font-size: 0.875rem;
        padding: 0.5rem 1rem;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        transition: all 0.15s;
    }
    .archive-btn:hover, .back-link:hover {
        color: var(--foreground);
        border-color: var(--muted-foreground);
    }

    /* === CARDS === */
    .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1.25rem;
        margin-bottom: 1rem;
    }

    .card h2 {
        font-size: 1.125rem;
        font-weight: 600;
        margin-bottom: 1rem;
        letter-spacing: -0.015em;
    }

    .card p { color: var(--card-foreground); }

    .muted { color: var(--muted-foreground); font-size: 0.875rem; }
    .muted-sm { color: var(--muted-foreground); font-size: 0.75rem; margin-top: 0.25rem; }

    /* === HERO SUMMARY === */
    .hero {
        margin-bottom: 1.5rem;
    }
    .summary {
        font-size: 1.25rem;
        font-weight: 600;
        line-height: 1.4;
        letter-spacing: -0.02em;
        background: linear-gradient(135deg, oklch(0.95 0 0), var(--accent-blue));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .badge-sm {
        padding: 0.125rem 0.5rem;
        font-size: 0.6875rem;
    }

    /* === CROSSOVERS === */
    .crossovers-list { display: flex; flex-direction: column; gap: 0.75rem; }

    .crossover-item {
        padding: 0.5rem 0;
    }
    .crossover-item h3 {
        font-size: 0.8125rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--accent-purple);
        margin-bottom: 0.375rem;
    }
    .perspectives { display: flex; flex-direction: column; gap: 0.125rem; }
    .perspective {
        padding: 0.125rem 0;
        font-size: 0.8125rem;
        line-height: 1.4;
    }
    .perspective-channel {
        font-weight: 700;
        font-size: 0.6875rem;
        color: var(--accent-blue);
        display: inline;
        margin-right: 0.375rem;
    }
    .perspective p { color: var(--card-foreground); display: inline; }
    .so-what {
        margin-top: 0.5rem;
        padding-top: 0.375rem;
        border-top: 1px solid var(--border);
        font-size: 0.8125rem;
        font-weight: 600;
        color: var(--accent-amber);
    }

    /* === CHANNEL SECTIONS === */
    .channel-card { }
    .channel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        margin-bottom: 0.5rem;
    }
    .channel-name-row {
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }
    .channel-avatar {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        flex-shrink: 0;
    }
    .channel-header h2 {
        margin-bottom: 0;
        font-size: 1rem;
        letter-spacing: -0.02em;
        color: var(--accent-blue);
    }
    .ch-count {
        font-size: 0.6875rem;
        font-weight: 600;
        color: var(--accent-green);
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }
    .channel-takeaway {
        font-size: 0.8125rem;
        line-height: 1.4;
        color: var(--foreground);
        margin-bottom: 0.75rem;
        font-style: italic;
    }

    /* === TOOLS & TECH === */
    .tools-list { display: flex; flex-direction: column; gap: 0.75rem; }

    .tool-row {
        padding: 0.75rem;
        border: 1px solid var(--border);
        border-radius: calc(var(--radius) * 0.8);
    }
    .tool-name {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.25rem;
    }
    .tool-context {
        font-size: 0.8125rem;
        line-height: 1.5;
        color: var(--card-foreground);
    }

    .sentiment-pos { background: oklch(0.35 0.15 145); color: oklch(0.85 0.15 145); }
    .sentiment-neg { background: oklch(0.35 0.15 25); color: oklch(0.85 0.15 25); }
    .sentiment-mix { background: oklch(0.35 0.12 80); color: oklch(0.85 0.12 80); }
    .sentiment-neu { background: var(--accent); color: var(--foreground); }


    /* === CHANNEL VIDEOS COLLAPSED === */
    .channel-videos > summary {
        font-size: 0.75rem;
        color: var(--accent-blue);
        cursor: pointer;
        padding: 0.25rem 0;
        user-select: none;
        letter-spacing: 0.03em;
    }
    .channel-videos > summary:hover { color: oklch(0.85 0.15 250); }
    .channel-videos > .video-list { margin-top: 0.5rem; }

    /* === SEEN SECTION === */
    .seen-section {
        margin-top: 0.75rem;
        border-top: 1px solid var(--border);
        padding-top: 0.5rem;
    }
    .seen-section > summary {
        font-size: 0.8125rem;
        color: var(--muted-foreground);
        cursor: pointer;
        padding: 0.25rem 0;
        user-select: none;
    }
    .seen-section > summary:hover { color: var(--foreground); }
    .seen-section > .video-list { margin-top: 0.5rem; opacity: 0.75; }

    /* === SECTION TITLES === */
    .section-title {
        font-size: 1.125rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin: 2rem 0 1rem;
        padding-bottom: 0.5rem;
        border-bottom: 2px solid var(--border);
    }
    .creator-title { color: var(--accent-blue); border-color: var(--accent-blue); }
    .shipped-title { color: var(--accent-green); border-color: var(--accent-green); }
    .buzz-title { color: var(--accent-amber); border-color: var(--accent-amber); }

    /* === BUZZING === */
    .buzz-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .buzz-item { padding: 0.25rem 0; }
    .buzz-header {
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }
    .buzz-handle {
        font-size: 0.8125rem;
        font-weight: 700;
        color: var(--accent-amber);
    }
    .buzz-summary {
        font-size: 0.8125rem;
        color: var(--card-foreground);
        margin-top: 0.125rem;
    }

    /* === TOOL UPDATES === */
    .tool-section-title { color: var(--accent-green) !important; }
    .tool-link { justify-content: space-between; }
    .tool-version {
        font-size: 0.6875rem;
        font-weight: 700;
        font-family: var(--font-mono);
        color: var(--accent-green);
        background: oklch(0.2 0.08 155);
        padding: 0.125rem 0.5rem;
        border-radius: 999px;
        white-space: nowrap;
    }

    /* === VIDEO CONTEXT === */
    .video-context {
        padding: 0.125rem 0.75rem 0.25rem;
    }
    .video-about {
        font-size: 0.75rem;
        color: var(--card-foreground);
        line-height: 1.3;
    }
    .video-why {
        font-size: 0.6875rem;
        color: var(--accent-green);
        line-height: 1.3;
        margin-top: 0.125rem;
        font-style: italic;
    }

    /* === EXPANDABLE DETAILS === */
    .video-details {
        padding: 0 0.75rem 0.5rem;
    }
    .video-details summary {
        font-size: 0.6875rem;
        color: var(--accent-blue);
        cursor: pointer;
        padding: 0.25rem 0;
        user-select: none;
        letter-spacing: 0.03em;
    }
    .video-details summary:hover { color: oklch(0.85 0.15 250); }
    .detail-body {
        padding: 0.5rem 0;
    }
    .detail-hook {
        font-size: 0.8125rem;
        font-weight: 600;
        color: var(--foreground);
        margin-bottom: 0.375rem;
    }
    .detail-line {
        font-size: 0.8125rem;
        line-height: 1.5;
        color: var(--card-foreground);
        margin-bottom: 0.25rem;
    }
    .detail-line strong {
        color: var(--foreground);
    }
    .detail-list {
        padding-left: 1.25rem;
        margin: 0.25rem 0 0.5rem;
    }
    .detail-list li {
        font-size: 0.8125rem;
        line-height: 1.5;
        color: var(--card-foreground);
        margin-bottom: 0.125rem;
    }
    .detail-list li strong {
        color: var(--foreground);
    }
    .detail-link {
        color: var(--accent-blue);
        text-decoration: none;
        border-bottom: 1px solid oklch(0.7 0.15 250 / 30%);
    }
    .detail-link:hover {
        color: oklch(0.85 0.15 250);
        border-bottom-color: oklch(0.85 0.15 250);
    }

    /* === CROSSOVER DETAILS === */
    .crossover-head { }
    .crossover-details summary {
        font-size: 0.6875rem;
        color: var(--accent-blue);
        cursor: pointer;
        margin-top: 0.25rem;
        letter-spacing: 0.03em;
    }
    .crossover-details summary:hover { color: oklch(0.85 0.15 250); }
    .crossover-details .perspectives { margin-top: 0.375rem; }

    /* === VIDEO LIST === */
    .video-list { display: flex; flex-direction: column; gap: 0.5rem; }

    .video-row {
        border: 1px solid var(--border);
        border-radius: calc(var(--radius) * 0.8);
        overflow: hidden;
        transition: border-color 0.15s;
    }
    .video-row:hover { border-color: var(--muted-foreground); }

    .video-link {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 0.75rem;
        text-decoration: none;
        color: inherit;
    }

    .thumbnail {
        width: 120px;
        height: 68px;
        object-fit: cover;
        border-radius: calc(var(--radius) * 0.6);
        flex-shrink: 0;
    }

    .video-info { flex: 1; min-width: 0; }
    .video-title {
        font-size: 0.8125rem;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        letter-spacing: -0.01em;
    }
    .one-liner {
        font-size: 0.6875rem;
        color: var(--muted-foreground);
        line-height: 1.3;
        margin-top: 0.125rem;
    }
    .video-meta { font-size: 0.625rem; color: var(--muted-foreground); margin-top: 0.125rem; }

    .video-stats {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 0.25rem;
        font-size: 0.75rem;
        color: var(--muted-foreground);
        white-space: nowrap;
    }

    .video-row-actions {
        padding: 0 0.75rem 0.5rem;
    }

    .read-more {
        display: inline-block;
        font-size: 0.75rem;
        color: oklch(0.7 0.15 250);
        text-decoration: none;
        padding: 0.125rem 0.625rem;
        border: 1px solid oklch(0.7 0.15 250 / 30%);
        border-radius: 999px;
        transition: all 0.15s;
    }
    .read-more:hover {
        background: oklch(0.7 0.15 250 / 10%);
        border-color: oklch(0.7 0.15 250);
    }

    .badge-green {
        display: inline-block;
        padding: 0.125rem 0.5rem;
        font-size: 0.625rem;
        font-weight: 700;
        border-radius: 999px;
        background: oklch(0.25 0.12 155);
        color: var(--accent-green);
        letter-spacing: 0.02em;
    }

    /* === ARCHIVE === */
    .archive-list {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }
    .archive-link {
        display: block;
        padding: 0.75rem 1rem;
        color: var(--foreground);
        text-decoration: none;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        font-family: var(--font-mono);
        font-size: 0.875rem;
        transition: border-color 0.15s;
    }
    .archive-link:hover { border-color: var(--muted-foreground); }

    /* === FOOTER === */
    footer {
        margin-top: 3rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border);
        text-align: center;
    }

    /* === RESPONSIVE === */
    @media (max-width: 640px) {
        .container { padding: 1rem; }
        .thumbnail { width: 80px; height: 45px; }
        .video-link { gap: 0.75rem; padding: 0.5rem; }
        .header { flex-direction: column; gap: 0.75rem; }
    }
</style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Brief Archive</h1>
            <a href="../index.html" class="back-link">Latest Brief</a>
        </header>
        <div class="archive-list">
            <a href="2026-04-11.html" class="archive-link">2026-04-11</a>
<a href="2026-04-10.html" class="archive-link">2026-04-10</a>
        </div>
    </div>
</body>
</html>
