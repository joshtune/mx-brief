<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brief Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Serif+4:wght@400;600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
    <style>
    :root {
        --ink:          #1a1a1a;
        --ink-light:    #4a4a4a;
        --ink-faint:    #8a8a8a;
        --paper:        #faf9f6;
        --paper-dark:   #f0eeea;
        --rule:         #1a1a1a;
        --rule-light:   #d4d0c8;
        --rule-hair:    #e8e5de;
        --accent:       #8b0000;
        --accent-light: #c41e3a;

        --font-display: 'Playfair Display', Georgia, serif;
        --font-body:    'Source Serif 4', Georgia, serif;
        --font-ui:      'Source Sans 3', 'Helvetica Neue', sans-serif;

        --page-max:     1100px;
        --col-gap:      2rem;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: var(--font-body);
        background: var(--paper);
        color: var(--ink);
        line-height: 1.65;
        -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }

    .page {
        max-width: var(--page-max);
        margin: 0 auto;
        padding: 2rem 1.5rem;
    }

    /* === MASTHEAD === */
    .masthead { text-align: center; margin-bottom: 1.5rem; }

    .masthead-rule {
        height: 3px;
        background: var(--rule);
        margin-bottom: 0.5rem;
        position: relative;
    }
    .masthead-rule::after {
        content: '';
        position: absolute;
        bottom: -4px;
        left: 0; right: 0;
        height: 1px;
        background: var(--rule);
    }

    .masthead-meta {
        display: flex;
        justify-content: space-between;
        font-family: var(--font-ui);
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--ink-faint);
        padding: 0.5rem 0 0.25rem;
    }

    .masthead-title {
        font-family: var(--font-display);
        font-size: 3.25rem;
        font-weight: 900;
        letter-spacing: -0.02em;
        line-height: 1.1;
        padding: 0.25rem 0;
    }

    .masthead-dateline {
        font-family: var(--font-ui);
        font-size: 0.875rem;
        color: var(--ink-light);
        padding-bottom: 0.5rem;
    }

    .masthead-dot { margin: 0 0.5rem; }
    .masthead-link { text-decoration: underline; }
    .masthead-link:hover { color: var(--accent); }

    /* === TICKER === */
    .ticker {
        font-family: var(--font-ui);
        font-size: 0.8125rem;
        font-variant: small-caps;
        letter-spacing: 0.05em;
        border-top: 1px solid var(--rule-light);
        border-bottom: 1px solid var(--rule-light);
        padding: 0.5rem 0;
        margin-bottom: 2rem;
        color: var(--ink-light);
    }
    .ticker-label {
        font-weight: 600;
        color: var(--accent);
        margin-right: 0.75rem;
    }

    /* === FRONT PAGE === */
    .front-page { margin-bottom: 2rem; }

    .front-grid {
        display: grid;
        grid-template-columns: 1fr 2fr 1fr;
        gap: var(--col-gap);
    }

    .front-sidebar { font-size: 0.875rem; }

    .sidebar-header {
        font-family: var(--font-display);
        font-variant: small-caps;
        font-size: 0.8125rem;
        letter-spacing: 0.1em;
        border-bottom: 2px solid var(--rule);
        padding-bottom: 0.25rem;
        margin-bottom: 0.75rem;
    }

    .dispatch {
        padding: 0.5rem 0;
        border-bottom: 1px solid var(--rule-hair);
        font-size: 0.8125rem;
        line-height: 1.5;
    }

    .pattern-list {
        padding-left: 1rem;
        font-size: 0.8125rem;
        line-height: 1.6;
    }
    .pattern-list li {
        margin-bottom: 0.5rem;
        border-bottom: 1px solid var(--rule-hair);
        padding-bottom: 0.5rem;
    }

    .lead-story {
        border-left: 1px solid var(--rule-light);
        border-right: 1px solid var(--rule-light);
        padding: 0 var(--col-gap);
    }

    .lead-headline {
        font-family: var(--font-display);
        font-size: 1.75rem;
        font-weight: 700;
        line-height: 1.2;
        margin-bottom: 0.75rem;
    }

    .lead-body {
        font-size: 1rem;
        line-height: 1.7;
    }

    /* === SECTION HEADERS === */
    .section { margin-bottom: 2.5rem; }

    .section-header {
        border-top: 3px solid var(--rule);
        padding-top: 0.5rem;
        margin-bottom: 1rem;
    }
    .section-header h2 {
        font-family: var(--font-display);
        font-variant: small-caps;
        font-size: 0.9375rem;
        letter-spacing: 0.12em;
        text-transform: lowercase;
    }

    /* === HEADLINES (TRENDING) === */
    .headlines-grid {
        display: grid;
        grid-template-columns: 1.5fr 1fr;
        gap: var(--col-gap);
    }

    .headline a {
        display: block;
        transition: color 0.15s;
    }
    .headline a:hover .headline-title { color: var(--accent); }

    .headline-img {
        width: 100%;
        aspect-ratio: 16/9;
        object-fit: cover;
        filter: grayscale(100%);
        transition: filter 0.3s;
        margin-bottom: 0.5rem;
    }
    .headline a:hover .headline-img { filter: grayscale(0%); }

    .headline-title {
        font-family: var(--font-display);
        font-size: 1.125rem;
        font-weight: 700;
        line-height: 1.25;
        margin-bottom: 0.25rem;
        transition: color 0.15s;
    }
    .headline--lead .headline-title {
        font-size: 1.625rem;
    }

    .headline-meta {
        font-family: var(--font-ui);
        font-size: 0.75rem;
        color: var(--ink-faint);
    }

    .headline-why {
        font-size: 0.875rem;
        color: var(--ink-light);
        margin-top: 0.25rem;
        font-style: italic;
    }

    .headlines-secondary {
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }
    .headlines-secondary .headline {
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--rule-hair);
    }
    .headlines-secondary .headline-img {
        display: none;
    }

    .delta {
        font-family: var(--font-ui);
        font-size: 0.6875rem;
        font-weight: 600;
        color: #2d6a2e;
        background: #edf7ed;
        padding: 0.125rem 0.375rem;
        border-radius: 2px;
    }

    /* === CATEGORY SECTIONS === */
    .category-insight {
        font-size: 0.9375rem;
        color: var(--ink-light);
        font-style: italic;
        margin-bottom: 1rem;
        padding-bottom: 0.75rem;
        border-bottom: 1px solid var(--rule-hair);
    }
    .themes {
        font-style: normal;
        font-family: var(--font-ui);
        font-size: 0.75rem;
        color: var(--ink-faint);
        margin-top: 0.25rem;
    }

    .section-grid {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: var(--col-gap);
    }

    .article--lead { margin-bottom: 1rem; }

    .article--lead a { display: block; }
    .article--lead a:hover .article-title { color: var(--accent); }

    .article-img {
        width: 100%;
        aspect-ratio: 16/9;
        object-fit: cover;
        filter: grayscale(100%);
        transition: filter 0.3s;
        margin-bottom: 0.5rem;
    }
    .article--lead a:hover .article-img { filter: grayscale(0%); }

    .article-title {
        font-family: var(--font-display);
        font-size: 1.25rem;
        font-weight: 700;
        line-height: 1.25;
        margin-bottom: 0.25rem;
        transition: color 0.15s;
    }

    .article-meta {
        font-family: var(--font-ui);
        font-size: 0.75rem;
        color: var(--ink-faint);
    }

    .article-rule {
        height: 1px;
        background: var(--rule-light);
        margin: 0.75rem 0;
    }

    /* === COMPACT ROWS === */
    .compact-row {
        padding: 0.5rem 0;
        border-bottom: 1px solid var(--rule-hair);
    }
    .compact-row a {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 1rem;
    }
    .compact-row a:hover .compact-title { color: var(--accent); }

    .compact-title {
        font-family: var(--font-display);
        font-size: 0.9375rem;
        font-weight: 600;
        line-height: 1.3;
        flex: 1;
        transition: color 0.15s;
    }

    .compact-meta {
        font-family: var(--font-ui);
        font-size: 0.6875rem;
        color: var(--ink-faint);
        white-space: nowrap;
        flex-shrink: 0;
    }

    /* === INSET BOXES === */
    .section-sidebar {
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }

    .inset {
        background: var(--paper-dark);
        border: 1px solid var(--rule-light);
        padding: 1rem;
    }

    .inset-title {
        font-family: var(--font-display);
        font-size: 0.875rem;
        font-weight: 700;
        border-bottom: 1px solid var(--rule-light);
        padding-bottom: 0.375rem;
        margin-bottom: 0.5rem;
    }

    .inset-body {
        font-size: 0.8125rem;
        line-height: 1.5;
    }

    .inset-vids {
        font-family: var(--font-ui);
        font-size: 0.6875rem;
        color: var(--ink-faint);
        margin-top: 0.375rem;
        font-style: italic;
    }

    /* === COLOPHON === */
    .colophon {
        text-align: center;
        font-family: var(--font-ui);
        font-size: 0.75rem;
        color: var(--ink-faint);
        margin-top: 3rem;
    }

    .colophon-rule {
        height: 3px;
        background: var(--rule);
        margin-bottom: 1rem;
        position: relative;
    }
    .colophon-rule::after {
        content: '';
        position: absolute;
        top: -4px;
        left: 0; right: 0;
        height: 1px;
        background: var(--rule);
    }

    .colophon a { text-decoration: underline; }
    .colophon a:hover { color: var(--accent); }

    /* === ARCHIVE === */
    .archive-list {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        margin-top: 1.5rem;
    }
    .archive-entry {
        display: block;
        padding: 0.75rem 1rem;
        font-family: var(--font-ui);
        font-size: 0.9375rem;
        border: 1px solid var(--rule-light);
        transition: border-color 0.15s;
    }
    .archive-entry:hover { border-color: var(--rule); }
    .archive-back {
        font-weight: 600;
        border-color: var(--rule);
    }

    .no-data {
        font-family: var(--font-ui);
        color: var(--ink-faint);
        font-size: 0.875rem;
        margin-top: 1rem;
    }

    /* === RESPONSIVE === */
    @media (max-width: 1023px) {
        .front-grid {
            grid-template-columns: 1fr 1fr;
        }
        .front-grid .front-sidebar:last-child {
            grid-column: 1 / -1;
        }
        .lead-story {
            border-left: none;
            border-right: none;
            padding: 0;
        }
    }

    @media (max-width: 767px) {
        .page { padding: 1rem; }

        .masthead-title { font-size: 2rem; }
        .masthead-meta { flex-direction: column; align-items: center; gap: 0.125rem; }

        .front-grid { grid-template-columns: 1fr; }
        .headlines-grid { grid-template-columns: 1fr; }
        .section-grid { grid-template-columns: 1fr; }

        .lead-story {
            border-left: none;
            border-right: none;
            padding: 0;
            border-top: 1px solid var(--rule-light);
            padding-top: 1rem;
        }

        .headlines-secondary .headline-img { display: block; }

        .compact-row a { flex-direction: column; gap: 0.125rem; }
    }
</style>
</head>
<body>
    <div class="page">
        <header class="masthead">
            <div class="masthead-rule"></div>
            <h1 class="masthead-title">The Morning Brief</h1>
            <div class="masthead-dateline">Archive</div>
            <div class="masthead-rule"></div>
        </header>
        <div class="archive-list">
            <a href="../index.html" class="archive-entry archive-back">Latest Edition</a>
            <a href="2026-04-02.html" class="archive-entry">2026-04-02</a>
<a href="2026-04-01.html" class="archive-entry">2026-04-01</a>
        </div>
    </div>
</body>
</html>
