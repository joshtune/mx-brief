<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brief Archive</title>
    <style>
    :root {
        --background: oklch(0.145 0 0);
        --foreground: oklch(0.985 0 0);
        --card: oklch(0.205 0 0);
        --card-foreground: oklch(0.985 0 0);
        --muted: oklch(0.269 0 0);
        --muted-foreground: oklch(0.708 0 0);
        --border: oklch(1 0 0 / 10%);
        --accent: oklch(0.269 0 0);
        --destructive: oklch(0.704 0.191 22.216);
        --radius: 0.625rem;
        --font-sans: system-ui, -apple-system, 'Segoe UI', sans-serif;
        --font-mono: ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: var(--font-sans);
        background: var(--background);
        color: var(--foreground);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
    }

    .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
    }

    header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 2rem;
        padding-bottom: 1.5rem;
        border-bottom: 1px solid var(--border);
    }

    h1 {
        font-size: 1.875rem;
        font-weight: 700;
        letter-spacing: -0.025em;
    }

    .subtitle { color: var(--muted-foreground); font-size: 0.875rem; margin-top: 0.25rem; }

    .archive-btn, .back-link {
        color: var(--muted-foreground);
        text-decoration: none;
        font-size: 0.875rem;
        padding: 0.5rem 1rem;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        transition: all 0.15s;
    }
    .archive-btn:hover, .back-link:hover {
        color: var(--foreground);
        border-color: var(--muted-foreground);
    }

    .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1.5rem;
        margin-bottom: 1.5rem;
    }

    .card h2 {
        font-size: 1.125rem;
        font-weight: 600;
        margin-bottom: 1rem;
        letter-spacing: -0.015em;
    }

    .card h3 {
        font-size: 0.975rem;
        font-weight: 600;
        margin-bottom: 0.25rem;
    }

    .card p { color: var(--card-foreground); }
    .card ul { padding-left: 1.25rem; }
    .card li { margin-bottom: 0.5rem; color: var(--card-foreground); }

    .muted { color: var(--muted-foreground); font-size: 0.875rem; }

    .video-list { display: flex; flex-direction: column; gap: 0.5rem; }

    .video-row {
        border: 1px solid var(--border);
        border-radius: calc(var(--radius) * 0.8);
        overflow: hidden;
        transition: border-color 0.15s;
    }
    .video-row:hover { border-color: var(--muted-foreground); }

    .video-link {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 0.75rem;
        text-decoration: none;
        color: inherit;
    }

    .thumbnail {
        width: 120px;
        height: 68px;
        object-fit: cover;
        border-radius: calc(var(--radius) * 0.6);
        flex-shrink: 0;
    }

    .video-info { flex: 1; min-width: 0; }
    .video-title {
        font-size: 0.875rem;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .video-meta { font-size: 0.75rem; color: var(--muted-foreground); }

    .video-stats {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 0.25rem;
        font-size: 0.75rem;
        color: var(--muted-foreground);
        white-space: nowrap;
    }

    .badge {
        display: inline-block;
        padding: 0.25rem 0.625rem;
        font-size: 0.75rem;
        font-weight: 500;
        border-radius: 999px;
        background: var(--accent);
        color: var(--foreground);
        margin: 0.125rem;
    }

    .badge-green {
        display: inline-block;
        padding: 0.125rem 0.5rem;
        font-size: 0.7rem;
        font-weight: 600;
        border-radius: 999px;
        background: oklch(0.35 0.15 145);
        color: oklch(0.85 0.15 145);
    }

    .keywords { display: flex; flex-wrap: wrap; gap: 0.375rem; }

    .cluster {
        padding: 1rem;
        border: 1px solid var(--border);
        border-radius: calc(var(--radius) * 0.8);
        margin-bottom: 0.75rem;
    }

    .highlight {
        padding: 0.75rem;
        border-bottom: 1px solid var(--border);
    }
    .highlight:last-child { border-bottom: none; }

    .archive-list {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }
    .archive-link {
        display: block;
        padding: 0.75rem 1rem;
        color: var(--foreground);
        text-decoration: none;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        font-family: var(--font-mono);
        font-size: 0.875rem;
        transition: border-color 0.15s;
    }
    .archive-link:hover { border-color: var(--muted-foreground); }

    footer {
        margin-top: 3rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border);
        text-align: center;
    }

    @media (max-width: 640px) {
        .container { padding: 1rem; }
        .thumbnail { width: 80px; height: 45px; }
        .video-link { gap: 0.75rem; padding: 0.5rem; }
        header { flex-direction: column; gap: 0.75rem; }
    }
</style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Brief Archive</h1>
            <a href="../index.html" class="back-link">Latest Brief</a>
        </header>
        <div class="archive-list">
            <a href="2026-04-01.html" class="archive-link">2026-04-01</a>
        </div>
    </div>
</body>
</html>
